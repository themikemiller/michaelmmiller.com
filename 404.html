<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Mike Miller</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root {
    --bg: #0b0f1a;
    --text: #e2e4ea;
    --text-mid: #9ca3b4;
    --blue: #3b82f6;
    --white: #f1f3f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
  }
  .container {
    max-width: 480px;
  }
  h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 5rem;
    font-weight: 700;
    color: var(--blue);
    margin-bottom: 0.5rem;
    letter-spacing: -0.04em;
  }
  p {
    color: var(--text-mid);
    font-size: 1.1rem;
    margin-bottom: 2rem;
    line-height: 1.6;
    font-weight: 300;
  }
  a {
    display: inline-block;
    color: #fff;
    background: var(--blue);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.88rem;
    padding: 0.8rem 1.6rem;
    border-radius: 6px;
    transition: all 0.2s;
  }
  a:hover {
    background: #2563eb;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(59,130,246,0.25);
  }
</style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>This page doesn't exist. Let's get you back on track.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
